<!doctype html>
<html>
  <head>
    <title>nano-dice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>
      const MODE_DICE = 0;
      const MODE_DICE_KEEP = 1;
      const MODE_CHOOSE_SCORE = 2;
      const MODE_END_ROUND = 3;
      const MODE_END_GAME = 4;

      const KEY_LEFT = 37;
      const KEY_RIGHT = 39;
      const KEY_UP = 38;
      const KEY_DOWN = 40;
      const KEY_ENTER = 13;
      const KEY_SPACE = 32;
      const KEY_T = 84;

      const SCORE_ONES = "scoreOnes";
      const SCORE_TWOS = "scoreTwos";
      const SCORE_THREES = "scoreThrees";
      const SCORE_FOURS = "scoreFours";
      const SCORE_FIVES = "scoreFives";
      const SCORE_SIXES = "scoreSixes";
      const SCORE_SUM = "scoreSum";
      const SCORE_BONUS = "scoreBonus";
      const SCORE_SUM_BONUS = "scoreSumBonus";
      const SCORE_CHOICE = "scoreChoice";
      const SCORE_FOUR_OF_A_KIND = "scoreFourOfAKind";
      const SCORE_FULL_HOUSE = "scoreFullHouse";
      const SCORE_SMALL_STRAIGHT = "scoreSmallStraight";
      const SCORE_LARGE_STRAIGHT = "scoreLargeStraight";
      const SCORE_YACHT = "scoreYacht";
      const SCORE_TOTAL = "scoreTotal";

      const TABLE_ROWS = [
        SCORE_ONES,
        SCORE_TWOS,
        SCORE_THREES,
        SCORE_FOURS,
        SCORE_FIVES,
        SCORE_SIXES,
        SCORE_SUM,
        SCORE_BONUS,
        SCORE_SUM_BONUS,
        SCORE_CHOICE,
        SCORE_FOUR_OF_A_KIND,
        SCORE_FULL_HOUSE,
        SCORE_SMALL_STRAIGHT,
        SCORE_LARGE_STRAIGHT,
        SCORE_YACHT,
        SCORE_TOTAL,
      ];

      const TABLE_ROWS_SELECTABLE = [
        SCORE_ONES,
        SCORE_TWOS,
        SCORE_THREES,
        SCORE_FOURS,
        SCORE_FIVES,
        SCORE_SIXES,
        SCORE_CHOICE,
        SCORE_FOUR_OF_A_KIND,
        SCORE_FULL_HOUSE,
        SCORE_SMALL_STRAIGHT,
        SCORE_LARGE_STRAIGHT,
        SCORE_YACHT,
      ];

      const scoreCalculators = {
        [SCORE_ONES]: (dice) => getNumbersScore(dice, 1),
        [SCORE_TWOS]: (dice) => getNumbersScore(dice, 2),
        [SCORE_THREES]: (dice) => getNumbersScore(dice, 3),
        [SCORE_FOURS]: (dice) => getNumbersScore(dice, 4),
        [SCORE_FIVES]: (dice) => getNumbersScore(dice, 5),
        [SCORE_SIXES]: (dice) => getNumbersScore(dice, 6),
        [SCORE_CHOICE]: getChoiceScore,
        [SCORE_FOUR_OF_A_KIND]: getFourOfAKindScore,
        [SCORE_FULL_HOUSE]: getFullHouseScore,
        [SCORE_SMALL_STRAIGHT]: getSmallStraightScore,
        [SCORE_LARGE_STRAIGHT]: getLargeStraightScore,
        [SCORE_YACHT]: getYahtzeeScore,
      };

      let scores;
      let mode;
      let lastDiceMode;
      let selectedTableRow;
      let diceKeep;
      let activeDieKeep;
      let dice;
      let activeDie;
      let rollsLeft;
      let highScore = 0;

      function handleLoad() {
        const storedHighScore = localStorage.getItem("nanoDiceHighScore");
        if (storedHighScore) {
          highScore = parseInt(storedHighScore, 10);
        }

        initializeGame();
        refreshAll();
      }

      function initializeGame() {
        scores = {};
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          scores[TABLE_ROWS_SELECTABLE[i]] = null;
        }
        initializeRound();
      }

      function initializeRound() {
        mode = MODE_DICE;
        lastDiceMode = MODE_DICE;
        selectedTableRow = 0;
        diceKeep = [null, null, null, null, null];
        activeDieKeep = 0;
        dice = [
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
        ];
        activeDie = 0;
        rollsLeft = 2;

        gsap.fromTo(
          ".dice svg",
          { y: -100, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.2, stagger: 0.05 },
        );
      }

      function rollDice() {
        if (rollsLeft === 0) return;

        let rolled = 0;
        for (let i = 0; i < 5; i++) {
          if (dice[i] === null) continue;

          dice[i] = randomIntFromInterval(1, 6);
          if (rollsLeft > 1) {
            gsap.fromTo(
              ".dice svg:nth-child(" + (i + 1) + ")",
              { y: -200, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2, delay: rolled * 0.05 },
            );
          }
          rolled++;
        }

        rollsLeft--;
        if (rollsLeft === 0) {
          mode = MODE_CHOOSE_SCORE;
          setSelectedTableRowOnModeChange();
          gsap.fromTo(
            "svg:not(.none)",
            { opacity: 0 },
            { opacity: 1, duration: 1, stagger: 0.1 },
          );
        }
      }

      function handleDieClick(index) {
        if (index >= getDiceCount()) return;
        activeDie = index;
        keepCurrentDie();
        refreshAll();
      }

      function handleDieKeepClick(index) {
        if (index >= getDiceKeepCount()) return;
        activeDieKeep = index;
        releaseCurrentDie();
        refreshAll();
      }

      function handleRowClick(rowId) {
        const rowIndex = TABLE_ROWS_SELECTABLE.indexOf(rowId);
        if (rowIndex === -1 || scores[rowId] !== null) return;

        if (
          mode === MODE_CHOOSE_SCORE ||
          mode === MODE_DICE ||
          mode === MODE_DICE_KEEP
        ) {
          selectedTableRow = rowIndex;
          chooseScore();
          if (isEndOfGame()) {
            mode = MODE_END_GAME;
            gsap.fromTo(
              ".end-of-game",
              { y: -100, opacity: 0 },
              { y: 0, opacity: 1, duration: 1 },
            );
          } else {
            mode = MODE_END_ROUND;
          }
          refreshAll();
        }
      }

      function handleRollClick() {
        if (mode == MODE_END_GAME) {
          initializeGame();
        } else if (mode === MODE_END_ROUND) {
          initializeRound();
        } else if (rollsLeft > 0) {
          rollDice();
        }
        refreshAll();
      }

      function toggleTheme() {
        const root = document.documentElement;
        const currentTheme = root.getAttribute("data-theme");

        if (currentTheme === "dark") {
          root.setAttribute("data-theme", "light");
        } else if (currentTheme === "light") {
          root.setAttribute("data-theme", "dark");
        } else {
          const prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)",
          ).matches;
          root.setAttribute("data-theme", prefersLight ? "dark" : "light");
        }
      }

      function handleKeyDown(e) {
        switch (e.keyCode) {
          case KEY_LEFT:
            if (mode === MODE_DICE_KEEP) {
              if (activeDieKeep === 0) {
                mode = MODE_CHOOSE_SCORE;
              } else {
                activeDieKeep =
                  (activeDieKeep - 1 + getDiceKeepCount()) % getDiceKeepCount();
              }
            } else if (mode === MODE_DICE) {
              if (activeDie === 0) {
                mode = MODE_CHOOSE_SCORE;
              } else {
                activeDie = (activeDie - 1 + getDiceCount()) % getDiceCount();
              }
            }
            e.preventDefault();
            break;
          case KEY_RIGHT:
            if (mode === MODE_CHOOSE_SCORE && rollsLeft > 0) {
              mode = lastDiceMode;
            } else if (mode === MODE_DICE_KEEP) {
              activeDieKeep = (activeDieKeep + 1) % getDiceKeepCount();
            } else if (mode === MODE_DICE) {
              activeDie = (activeDie + 1) % getDiceCount();
            }
            e.preventDefault();
            break;
          case KEY_UP:
            if (mode === MODE_CHOOSE_SCORE) {
              do {
                selectedTableRow = getPreviousSelectedTableRow();
              } while (
                scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null
              );
            } else if (mode === MODE_DICE) {
              mode = MODE_DICE_KEEP;
              lastDiceMode = MODE_DICE_KEEP;
            }
            e.preventDefault();
            break;
          case KEY_DOWN:
            if (mode === MODE_CHOOSE_SCORE) {
              do {
                selectedTableRow = getNextSelectedTableRow();
              } while (
                scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null
              );
            } else if (mode === MODE_DICE_KEEP) {
              if (dice.filter((a) => a === null).length < 5) {
                mode = MODE_DICE;
                lastDiceMode = MODE_DICE;
              }
            }
            e.preventDefault();
            break;
          case KEY_ENTER:
            if (mode == MODE_END_GAME) {
              initializeGame();
            } else if (mode === MODE_END_ROUND) {
              initializeRound();
            } else if (mode === MODE_CHOOSE_SCORE) {
              chooseScore();
              if (isEndOfGame()) {
                mode = MODE_END_GAME;
                gsap.fromTo(
                  ".end-of-game",
                  { y: -50, opacity: 0 },
                  { y: 0, opacity: 1, duration: 1 },
                );
              } else {
                mode = MODE_END_ROUND;
              }
            } else {
              rollDice();
            }
            e.preventDefault();
            break;
          case KEY_SPACE:
            if (mode === MODE_DICE_KEEP) {
              releaseCurrentDie();
            } else if (mode === MODE_DICE) {
              keepCurrentDie();
            }
            e.preventDefault();
            break;
          case KEY_T:
            toggleTheme();
            e.preventDefault();
            break;
        }
        refreshAll();
      }

      function keepCurrentDie() {
        for (let i = 0; i < 5; i++) {
          if (diceKeep[i] === null) {
            diceKeep[i] = dice[activeDie];
            gsap.fromTo(
              ".dice-keep svg:nth-child(" + (i + 1) + ")",
              { y: 50, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2 },
            );
            break;
          }
        }

        dice.splice(activeDie, 1);
        dice[4] = null;
        activeDie = Math.max(Math.min(activeDie, getDiceCount() - 1), 0);

        if (getDiceCount() === 0) {
          activeDieKeep = 0;
          mode = MODE_DICE_KEEP;
          lastDiceMode = MODE_DICE_KEEP;
        }
      }

      function releaseCurrentDie() {
        for (let i = 0; i < 5; i++) {
          if (dice[i] === null) {
            dice[i] = diceKeep[activeDieKeep];
            gsap.fromTo(
              ".dice svg:nth-child(" + (i + 1) + ")",
              { y: -50, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2 },
            );
            break;
          }
        }

        diceKeep.splice(activeDieKeep, 1);
        diceKeep[4] = null;

        if (getDiceKeepCount() === 0) {
          activeDieKeep = 0;
          activeDie = 0;
          mode = MODE_DICE;
          lastDiceMode = MODE_DICE;
        } else {
          activeDieKeep = Math.min(activeDieKeep, getDiceKeepCount() - 1);
        }
      }

      function chooseScore() {
        const row = TABLE_ROWS_SELECTABLE[selectedTableRow];
        scores[row] = scoreCalculators[row](getCombinedDice());

        if (isEndOfGame()) {
          const total = calculateTotal();
          if (total > highScore) {
            highScore = total;
            localStorage.setItem("nanoDiceHighScore", highScore);

            gsap.fromTo(
              "#highScoreDisplay",
              { color: "var(--text)" },
              { color: "var(--overlay0)", duration: 1 },
            );
          }
        }

        gsap.fromTo(
          "#" + TABLE_ROWS_SELECTABLE[selectedTableRow],
          { y: -10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.2 },
        );
      }

      function refreshAll() {
        refreshTable();
        refreshDiceKeep();
        refreshDice();
        refreshUI();
      }

      function refreshTable() {
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          const elem = document.getElementById(TABLE_ROWS_SELECTABLE[i]);

          if (mode === MODE_CHOOSE_SCORE && i === selectedTableRow) {
            elem.classList.add("selected");
          } else {
            elem.classList.remove("selected");
          }

          if (mode === MODE_END_ROUND || mode === MODE_END_GAME) {
            elem.classList.add("disabled");
          } else {
            elem.classList.remove("disabled");
          }

          if (scores[TABLE_ROWS_SELECTABLE[i]] !== null) {
            elem.classList.add("has-score");
          } else {
            elem.classList.remove("has-score");
          }

          elem.children[1].innerHTML =
            scores[TABLE_ROWS_SELECTABLE[i]] !== null
              ? scores[TABLE_ROWS_SELECTABLE[i]]
              : showSuggestion(TABLE_ROWS_SELECTABLE[i]);
        }

        const sum = calculateSum();
        const bonus = calculateBonus();
        let sumBonus = sum + "/63";
        sumBonus += bonus === null ? "" : ", +" + bonus;

        document.getElementById(SCORE_SUM).children[1].innerHTML = sum + "/63";
        document.getElementById(SCORE_BONUS).children[1].innerHTML =
          bonus === null ? "" : bonus;
        document.getElementById(SCORE_SUM_BONUS).children[1].innerHTML =
          sumBonus;
        document.getElementById(SCORE_TOTAL).children[1].innerHTML =
          calculateTotal();

        document.getElementById("highScoreValue").innerText =
          highScore > 0 ? highScore : "–";
      }

      function showSuggestion(row) {
        const score = scoreCalculators[row](getCombinedDice());
        return '<span class="suggestion">' + score + "</span>";
      }

      function refreshDiceKeep() {
        for (let i = 0; i < 5; i++) {
          const diceElem = document.getElementById("diceKeep" + i);

          if (mode === MODE_DICE_KEEP && i == activeDieKeep) {
            diceElem.classList.add("active-keep");
          } else {
            diceElem.classList.remove("active-keep");
          }

          if (
            mode === MODE_CHOOSE_SCORE ||
            mode === MODE_END_ROUND ||
            mode === MODE_END_GAME
          ) {
            diceElem.classList.add("disabled");
          } else {
            diceElem.classList.remove("disabled");
          }

          if (diceKeep[i] === null) {
            diceElem.classList.add("none");
          } else {
            diceElem.classList.remove("none");
          }

          const useElem = diceElem.querySelector("use");
          useElem.setAttribute(
            "href",
            diceKeep[i] === null ? "#dice-none" : "#dice-" + diceKeep[i],
          );
        }
      }

      function refreshDice() {
        for (let i = 0; i < 5; i++) {
          const diceElem = document.getElementById("dice" + i);

          if (mode === MODE_DICE && i == activeDie) {
            diceElem.classList.add("active");
          } else {
            diceElem.classList.remove("active");
          }

          if (
            mode === MODE_CHOOSE_SCORE ||
            mode === MODE_END_ROUND ||
            mode === MODE_END_GAME
          ) {
            diceElem.classList.add("disabled");
          } else {
            diceElem.classList.remove("disabled");
          }

          if (dice[i] === null) {
            diceElem.classList.add("none");
          } else {
            diceElem.classList.remove("none");
          }

          const useElem = diceElem.querySelector("use");
          useElem.setAttribute(
            "href",
            dice[i] === null ? "#dice-none" : "#dice-" + dice[i],
          );
        }
      }

      function refreshUI() {
        const btn = document.getElementById("rollDice");
        btn.disabled =
          rollsLeft === 0 && mode !== MODE_END_GAME && mode !== MODE_END_ROUND;

        if (mode === MODE_END_GAME) {
          btn.innerText = "Start new game";
        } else if (mode === MODE_END_ROUND) {
          btn.innerText = "Next round";
        } else {
          btn.innerText = "Roll dice (" + rollsLeft + ")";
        }

        if (isEndOfGame()) {
          document.getElementById("endOfGame").style.display = "block";
          document.getElementById("diceKeep").style.display = "none";
          document.getElementById("dice").style.display = "none";
        } else {
          document.getElementById("endOfGame").style.display = "none";
          document.getElementById("diceKeep").style.display = "flex";
          document.getElementById("dice").style.display = "flex";
        }
      }

      function calculateSum() {
        const topSection = [
          SCORE_ONES,
          SCORE_TWOS,
          SCORE_THREES,
          SCORE_FOURS,
          SCORE_FIVES,
          SCORE_SIXES,
        ];
        return topSection.reduce((sum, key) => sum + (scores[key] || 0), 0);
      }

      function calculateBonus() {
        const topSection = [
          SCORE_ONES,
          SCORE_TWOS,
          SCORE_THREES,
          SCORE_FOURS,
          SCORE_FIVES,
          SCORE_SIXES,
        ];
        const sum = calculateSum();
        if (sum >= 63) return 35;
        const allFilled = topSection.every((key) => scores[key] !== null);
        return allFilled ? 0 : null;
      }

      function calculateTotal() {
        const sumAll = TABLE_ROWS_SELECTABLE.reduce(
          (sum, key) => sum + (scores[key] || 0),
          0,
        );
        return sumAll + (calculateBonus() || 0);
      }

      function getNumbersScore(dice, targetNumber) {
        return dice
          .filter((d) => d === targetNumber)
          .reduce((s, d) => s + d, 0);
      }

      function getFullHouseScore(dice) {
        return isFullHouse(dice) ? dice.reduce((a, b) => a + b, 0) : 0;
      }

      function getFourOfAKindScore(dice) {
        return isFourOfAKind(dice) ? dice.reduce((a, b) => a + b, 0) : 0;
      }

      function getSmallStraightScore(dice) {
        return isSmallStraight(dice) ? 15 : 0;
      }

      function getLargeStraightScore(dice) {
        return isLargeStraight(dice) ? 30 : 0;
      }

      function getChoiceScore(dice) {
        return dice.reduce((sum, d) => sum + d, 0);
      }

      function getYahtzeeScore(dice) {
        return isYahtzee(dice) ? 50 : 0;
      }

      function isFullHouse(dice) {
        const counts = {};
        for (const die of dice) {
          counts[die] = (counts[die] || 0) + 1;
        }
        const values = Object.values(counts);
        return values.includes(3) && values.includes(2);
      }

      function isFourOfAKind(dice) {
        const counts = {};
        for (const die of dice) {
          counts[die] = (counts[die] || 0) + 1;
        }
        return Object.values(counts).some((count) => count >= 4);
      }

      function isSmallStraight(dice) {
        const sorted = [...new Set(dice)].sort((a, b) => a - b);
        const str = sorted.join("");
        return (
          str.includes("1234") || str.includes("2345") || str.includes("3456")
        );
      }

      function isLargeStraight(dice) {
        const sorted = [...new Set(dice)].sort((a, b) => a - b);
        const str = sorted.join("");
        return str === "12345" || str === "23456";
      }

      function isYahtzee(dice) {
        return new Set(dice).size === 1;
      }

      function randomIntFromInterval(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }

      function getDiceKeepCount() {
        return diceKeep.filter((d) => d !== null).length;
      }

      function getDiceCount() {
        return dice.filter((d) => d !== null).length;
      }

      function getCombinedDice() {
        return [
          ...dice.filter((a) => a !== null),
          ...diceKeep.filter((a) => a !== null),
        ];
      }

      function getPreviousSelectedTableRow() {
        return (
          (selectedTableRow - 1 + TABLE_ROWS_SELECTABLE.length) %
          TABLE_ROWS_SELECTABLE.length
        );
      }

      function getNextSelectedTableRow() {
        return (selectedTableRow + 1) % TABLE_ROWS_SELECTABLE.length;
      }

      function setSelectedTableRowOnModeChange() {
        selectedTableRow = 0;
        while (scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null) {
          selectedTableRow = getNextSelectedTableRow();
        }
      }

      function isEndOfGame() {
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          if (scores[TABLE_ROWS_SELECTABLE[i]] === null) return false;
        }
        return true;
      }

      function toggleInfo(event) {
        event.stopPropagation();
        const panel = document.getElementById("infoPanel");
        panel.classList.toggle("show");
      }

      document.addEventListener("click", function (event) {
        const panel = document.getElementById("infoPanel");
        const container = document.getElementById("infoContainer");
        if (
          panel.classList.contains("show") &&
          !container.contains(event.target)
        ) {
          panel.classList.remove("show");
        }
      });
    </script>

      }

      .dice-keep, .dice {
          gap: 2px;
      }

      @media (max-width: 1023px) {
        body {
          align-items: flex-end;
          padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        .main-container {
          flex-direction: column;
          align-items: center;
          gap: 8px;
        }

        .game-area {
          gap: 8px;
        }

        button.roll-dice {
          font-size: 20px;
          padding: 4px 12px;
        }

        .end-of-game {
          font-size: 48px;
          height: 120px;
          line-height: 120px;
        }

        .dice-keep svg {
          width: 48px;
        }

        .dice svg {
          width: 64px;
        }

        .score-sum,
        .score-bonus {
          display: none;
        }
      }

      @media (min-width: 1024px) {
        body {
          align-items: center;
        }

        .main-container {
          max-width: 896px;
        }

        .game-area {
          width: 640px;
        }

        .game-area {
          gap: 16px;
        }

        .dice-keep svg {
          border-radius: 16px;
        }

        .dice svg {
          border-radius: 24px;
        }

        .active-keep {
          background-color: var(--surface1);
        }

        .active {
          background-color: var(--surface1);
        }

        svg:not(.none, .disabled):hover {
          background-color: var(--surface1);
        }

        tr.selected {
          background-color: var(--surface0);
        }

        tr:not(.disabled, .has-score).selectable:hover {
          background-color: var(--surface0);
        }

        button:not(:disabled).roll-dice:hover {
          background-color: var(--surface1);
        }

        tr {
          cursor: default;
        }

        tr:not(.disabled, .has-score).selectable,
        .dice-keep svg:not(.none, .disabled),
        .dice svg:not(.none, .disabled),
        button.roll-dice:not(:disabled) {
          cursor: pointer;
        }

        .score-sum-bonus {
          display: none;
        }

        .end-of-game {
          font-size: 96px;
        }
      }

      button.roll-dice {
        font-size: 20px;
        border: 0;
        border-radius: 8px;
        padding: 16px;
        background-color: var(--surface0);
        color: var(--text);
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      button.roll-dice:disabled {
        color: var(--overlay0);
      }

      .dice-keep svg.disabled,
      .dice svg.disabled {
        pointer-events: none;
      }

      table {
        border-collapse: collapse;
        width: 256px;
      }

      th {
        text-align: left;
      }

      th,
      td {
        border: 1px solid var(--surface1);
        padding: 4px;
        font-size: 14px;
        width: 50%;
        transition: border-color 0.3s;
      }

      td.sum {
        font-size: 12px;
      }

      th:first-child,
      td:first-child {
        border-left: 0;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      thead tr:first-child th {
        border-top: 0;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .suggestion {
        color: var(--surface2);
        transition: color 0.3s;
      }

      .high-score-display {
        font-size: 12px;
        color: var(--overlay0);
        margin-top: 8px;
      }

      .info-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 100;
      }

      .info-button {
        width: 32px;
        height: 32px;
        color: var(--overlay0);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        transition: color 0.3s;
      }

      .info-button:hover {
        color: var(--text);
      }

      .info-panel {
        position: absolute;
        bottom: 40px;
        right: 0;
        background-color: var(--mantle);
        padding: 16px 20px;
        border-radius: 12px;
        width: max-content;
        opacity: 0;
        pointer-events: none;
        transform: translateY(5px);
        transition:
          opacity 0.2s,
          transform 0.2s,
          background-color 0.3s;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        color: var(--subtext0);
        font-size: 13px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .info-panel.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .info-panel p {
        margin: 0;
        display: flex;
        justify-content: space-between;
        gap: 24px;
      }

      .info-panel strong {
        color: var(--text);
        font-weight: 600;
      }

      .info-panel a {
        color: var(--blue);
        text-decoration: none;
        margin-top: 4px;
        transition: color 0.2s;
      }

      .info-panel a:hover {
        color: var(--lavender);
      }

      @media (max-width: 1023px) {
        .info-container {
          display: none;
        }
      }
    </style>
  </head>
