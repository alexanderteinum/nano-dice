<!doctype html>
<html>
  <head>
    <title>Five Dice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script>
      const MODE_END_ROUND = 0;
      const MODE_CHOOSE_SCORE = 1;
      const MODE_DICES_KEEP = 2;
      const MODE_DICES = 3;
      const MODE_END_GAME = 4;

      const KEY_LEFT = 37;
      const KEY_RIGHT = 39;
      const KEY_UP = 38;
      const KEY_DOWN = 40;
      const KEY_ENTER = 13;
      const KEY_SPACE = 32;

      const SCORE_ONES = "scoreOnes";
      const SCORE_TWOS = "scoreTwos";
      const SCORE_THREES = "scoreThrees";
      const SCORE_FOURS = "scoreFours";
      const SCORE_FIVES = "scoreFives";
      const SCORE_SIXES = "scoreSixes";
      const SCORE_SUM = "scoreSum";
      const SCORE_BONUS = "scoreBonus";
      const SCORE_FULL_HOUSE = "scoreFullHouse";
      const SCORE_FOUR_OF_A_KIND = "scoreFourOfAKind";
      const SCORE_SMALL_STRAIGHT = "scoreSmallStraight";
      const SCORE_BIG_STRAIGHT = "scoreBigStraight";
      const SCORE_CHOICE = "scoreChoice";
      const SCORE_YACHT = "scoreYacht";
      const SCORE_TOTAL = "scoreTotal";

      const TABLE_ROWS = [
        SCORE_ONES,
        SCORE_TWOS,
        SCORE_THREES,
        SCORE_FOURS,
        SCORE_FIVES,
        SCORE_SIXES,
        SCORE_SUM,
        SCORE_BONUS,
        SCORE_FULL_HOUSE,
        SCORE_FOUR_OF_A_KIND,
        SCORE_SMALL_STRAIGHT,
        SCORE_BIG_STRAIGHT,
        SCORE_CHOICE,
        SCORE_YACHT,
        SCORE_TOTAL,
      ];

      const TABLE_ROWS_SELECTABLE = [
        SCORE_ONES,
        SCORE_TWOS,
        SCORE_THREES,
        SCORE_FOURS,
        SCORE_FIVES,
        SCORE_SIXES,
        SCORE_FULL_HOUSE,
        SCORE_FOUR_OF_A_KIND,
        SCORE_SMALL_STRAIGHT,
        SCORE_BIG_STRAIGHT,
        SCORE_CHOICE,
        SCORE_YACHT,
      ];

      const scoreCalculators = {
        [SCORE_ONES]: (dices) => getNumbersScore(dices, 1),
        [SCORE_TWOS]: (dices) => getNumbersScore(dices, 2),
        [SCORE_THREES]: (dices) => getNumbersScore(dices, 3),
        [SCORE_FOURS]: (dices) => getNumbersScore(dices, 4),
        [SCORE_FIVES]: (dices) => getNumbersScore(dices, 5),
        [SCORE_SIXES]: (dices) => getNumbersScore(dices, 6),
        [SCORE_FULL_HOUSE]: getFullHouseScore,
        [SCORE_FOUR_OF_A_KIND]: getFourOfAKindScore,
        [SCORE_SMALL_STRAIGHT]: getSmallStraightScore,
        [SCORE_BIG_STRAIGHT]: getBigStraightScore,
        [SCORE_CHOICE]: getChoiceScore,
        [SCORE_YACHT]: getYahtzeeScore,
      };

      let scores;
      let mode;
      let lastDiceMode;
      let selectedTableRow;
      let dicesKeep;
      let activeDiceKeep;
      let dices;
      let activeDice;
      let rollsLeft;

      function initializeGame() {
        scores = {};
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          scores[TABLE_ROWS_SELECTABLE[i]] = null;
        }

        initializeRound();
      }

      function initializeRound() {
        mode = MODE_DICES;
        lastDiceMode = MODE_DICES;
        selectedTableRow = 0;
        dicesKeep = [null, null, null, null, null];
        activeDiceKeep = 0;
        dices = [
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
          randomIntFromInterval(1, 6),
        ];
        activeDice = 0;
        rollsLeft = 2;

        gsap.fromTo(
          "#dice img",
          { y: -100, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.2, stagger: 0.05 },
        );
      }

      function rollDice() {
        if (rollsLeft === 0) {
          return;
        }

        let rolled = 0;

        for (let i = 0; i < 5; i++) {
          if (dices[i] === null) {
            continue;
          }

          dices[i] = randomIntFromInterval(1, 6);
          if (rollsLeft > 1) {
            gsap.fromTo(
              "#dice img:nth-child(" + (i + 1) + ")",
              { y: -200, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2, delay: rolled * 0.05 },
            );
          }

          rolled++;
        }

        rollsLeft--;
        if (rollsLeft === 0) {
          mode = MODE_CHOOSE_SCORE;
          setSelectedTableRowOnModeChange();
          finishRound(true);
        }
      }

      function finishRound(animate) {
        for (let i = 0; i < 5; i++) {
          if (dicesKeep[i] === null) continue;

          dices[getDicesCount()] = dicesKeep[i];
          dicesKeep[i] = null;
        }

        dices.sort();

        if (!animate) return;

        gsap.fromTo(
          "#dice img",
          { opacity: 0 },
          { opacity: 1, duration: 1, stagger: 0.1 },
        );
      }

      function randomIntFromInterval(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }

      function getDicesKeepCount() {
        return dicesKeep.filter((d) => d !== null).length;
      }

      function getDicesCount() {
        return dices.filter((d) => d !== null).length;
      }

      function keepCurrentDice() {
        for (let i = 0; i < 5; i++) {
          if (dicesKeep[i] === null) {
            dicesKeep[i] = dices[activeDice];
            gsap.fromTo(
              "#diceKeep img:nth-child(" + (i + 1) + ")",
              { y: 50, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2 },
            );
            break;
          }
        }

        dices.splice(activeDice, 1);
        dices[4] = null;
        activeDice = Math.max(Math.min(activeDice, getDicesCount() - 1), 0);

        if (getDicesCount() === 0) {
          activeDiceKeep = 0;
          mode = MODE_DICES_KEEP;
          lastDiceMode = MODE_DICES_KEEP;
        }
      }

      function releaseCurrentDice() {
        for (let i = 0; i < 5; i++) {
          if (dices[i] === null) {
            dices[i] = dicesKeep[activeDiceKeep];
            gsap.fromTo(
              "#dice img:nth-child(" + (i + 1) + ")",
              { y: -50, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.2 },
            );
            break;
          }
        }

        dicesKeep.splice(activeDiceKeep, 1);
        dicesKeep[4] = null;

        if (getDicesKeepCount() === 0) {
          activeDiceKeep = 0;
          activeDice = 0;
          mode = MODE_DICES;
          lastDiceMode = MODE_DICES;
        } else {
          activeDiceKeep = Math.min(activeDiceKeep, getDicesKeepCount() - 1);
        }
      }

      function isYahtzee(dices) {
        return new Set(dices).size === 1;
      }

      function isFourOfAKind(dices) {
        const counts = {};
        for (const die of dices) {
          counts[die] = (counts[die] || 0) + 1;
        }
        return Object.values(counts).some((count) => count >= 4);
      }

      function isFullHouse(dices) {
        const counts = {};
        for (const die of dices) {
          counts[die] = (counts[die] || 0) + 1;
        }
        const values = Object.values(counts);
        return values.includes(3) && values.includes(2);
      }

      function isSmallStraight(dices) {
        const sorted = [...new Set(dices)].sort((a, b) => a - b);
        const str = sorted.join("");

        return (
          str.includes("1234") || str.includes("2345") || str.includes("3456")
        );
      }

      function isBigStraight(dices) {
        const sorted = [...new Set(dices)].sort((a, b) => a - b);
        const str = sorted.join("");

        return str === "12345" || str === "23456";
      }

      function getNumbersScore(dice, targetNumber) {
        return dice
          .filter((d) => d === targetNumber)
          .reduce((s, d) => s + d, 0);
      }

      function getFullHouseScore(dice) {
        return isFullHouse(dice) ? dice.reduce((a, b) => a + b, 0) : 0;
      }

      function getFourOfAKindScore(dice) {
        return isFourOfAKind(dice) ? dice.reduce((a, b) => a + b, 0) : 0;
      }

      function getSmallStraightScore(dice) {
        return isSmallStraight(dice) ? 15 : 0;
      }

      function getBigStraightScore(dice) {
        return isBigStraight(dice) ? 30 : 0;
      }

      function getChoiceScore(dice) {
        return dice.reduce((sum, d) => sum + d, 0);
      }

      function getYahtzeeScore(dice) {
        return isYahtzee(dice) ? 50 : 0;
      }

      function chooseScore() {
        finishRound(rollsLeft > 0);

        const row = TABLE_ROWS_SELECTABLE[selectedTableRow];
        scores[row] = scoreCalculators[row](dices);

        gsap.fromTo(
          "#" + TABLE_ROWS_SELECTABLE[selectedTableRow],
          { y: -10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.2 },
        );
      }

      function getPreviousSelectedTableRow() {
        return (
          (selectedTableRow - 1 + TABLE_ROWS_SELECTABLE.length) %
          TABLE_ROWS_SELECTABLE.length
        );
      }

      function getNextSelectedTableRow() {
        return (selectedTableRow + 1) % TABLE_ROWS_SELECTABLE.length;
      }

      function setSelectedTableRowOnModeChange() {
        selectedTableRow = 0;

        while (scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null) {
          selectedTableRow = getNextSelectedTableRow();
        }
      }

      function isEndOfGame() {
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          if (scores[TABLE_ROWS_SELECTABLE[i]] === null) return false;
        }

        return true;
      }

      function handleDiceClick(index) {
        if (index >= getDicesCount()) return;
        activeDice = index;
        keepCurrentDice();
        refreshAll();
      }

      function handleDiceKeepClick(index) {
        if (index >= getDicesKeepCount()) return;
        activeDiceKeep = index;
        releaseCurrentDice();
        refreshAll();
      }

      function handleRowClick(rowId) {
        const rowIndex = TABLE_ROWS_SELECTABLE.indexOf(rowId);
        if (rowIndex === -1 || scores[rowId] !== null) return;

        if (
          mode === MODE_CHOOSE_SCORE ||
          mode === MODE_DICES ||
          mode === MODE_DICES_KEEP
        ) {
          selectedTableRow = rowIndex;
          chooseScore();
          if (isEndOfGame()) {
            mode = MODE_END_GAME;
            gsap.fromTo(
              ".end-of-game",
              { y: -100, opacity: 0 },
              { y: 0, opacity: 1, duration: 1 },
            );
          } else {
            mode = MODE_END_ROUND;
          }
          refreshAll();
        }
      }

      function handleRollClick() {
        if (mode == MODE_END_GAME) {
          initializeGame();
        } else if (mode === MODE_END_ROUND) {
          initializeRound();
        } else if (rollsLeft > 0) {
          rollDice();
        }
        refreshAll();
      }

      function refreshAll() {
        refreshTable();
        refreshDicesKeep();
        refreshDices();
        refreshUI();
      }

      function handleKeyDown(e) {
        switch (e.keyCode) {
          case KEY_LEFT:
            if (mode === MODE_DICES_KEEP) {
              if (activeDiceKeep === 0) {
                mode = MODE_CHOOSE_SCORE;
              } else {
                activeDiceKeep =
                  (activeDiceKeep - 1 + getDicesKeepCount()) %
                  getDicesKeepCount(); // TODO: Math.max
              }
            } else if (mode === MODE_DICES) {
              if (activeDice === 0) {
                mode = MODE_CHOOSE_SCORE;
              } else {
                activeDice =
                  (activeDice - 1 + getDicesCount()) % getDicesCount(); // TODO: Math.max
              }
            }
            e.preventDefault();
            break;
          case KEY_RIGHT:
            if (mode === MODE_CHOOSE_SCORE && rollsLeft > 0) {
              mode = lastDiceMode;
            } else if (mode === MODE_DICES_KEEP) {
              activeDiceKeep = (activeDiceKeep + 1) % getDicesKeepCount();
            } else if (mode === MODE_DICES) {
              activeDice = (activeDice + 1) % getDicesCount();
            }
            e.preventDefault();
            break;
          case KEY_UP:
            if (mode === MODE_CHOOSE_SCORE) {
              do {
                selectedTableRow = getPreviousSelectedTableRow();
              } while (
                scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null
              );
            } else if (mode === MODE_DICES) {
              mode = MODE_DICES_KEEP;
              lastDiceMode = MODE_DICES_KEEP;
            }
            e.preventDefault();
            break;

          case KEY_DOWN:
            if (mode === MODE_CHOOSE_SCORE) {
              do {
                selectedTableRow = getNextSelectedTableRow();
              } while (
                scores[TABLE_ROWS_SELECTABLE[selectedTableRow]] !== null
              );
            } else if (mode === MODE_DICES_KEEP) {
              if (dices.filter((a) => a === null).length < 5) {
                mode = MODE_DICES;
                lastDiceMode = MODE_DICES;
              }
            }
            e.preventDefault();
            break;
          case KEY_ENTER:
            if (mode == MODE_END_GAME) {
              initializeGame();
            } else if (mode === MODE_END_ROUND) {
              initializeRound();
            } else if (mode === MODE_CHOOSE_SCORE) {
              chooseScore();
              if (isEndOfGame()) {
                mode = MODE_END_GAME;
                gsap.fromTo(
                  ".end-of-game",
                  { y: -100, opacity: 0 },
                  { y: 0, opacity: 1, duration: 1 },
                );
              } else {
                mode = MODE_END_ROUND;
              }
            } else {
              rollDice();
            }
            e.preventDefault();
            break;
          case KEY_SPACE:
            if (mode === MODE_DICES_KEEP) {
              releaseCurrentDice();
            } else if (mode === MODE_DICES) {
              keepCurrentDice();
            }
            e.preventDefault();
            break;
        }

        refreshTable();
        refreshDicesKeep();
        refreshDices();
        refreshUI();
      }

      function refreshUI() {
        const btn = document.getElementById("rollDice");
        btn.disabled =
          rollsLeft === 0 && mode !== MODE_END_GAME && mode !== MODE_END_ROUND;

        if (mode === MODE_END_GAME) {
          btn.innerText = "Start new game";
        } else if (mode === MODE_END_ROUND) {
          btn.innerText = "Next round";
        } else {
          btn.innerText = "Roll dice (" + rollsLeft + ")";
        }

        if (isEndOfGame()) {
          document.getElementById("endOfGame").style.display = "block";
          document.getElementById("diceKeep").style.display = "none";
          document.getElementById("dice").style.display = "none";
        } else {
          document.getElementById("endOfGame").style.display = "none";
          document.getElementById("diceKeep").style.display = "flex";
          document.getElementById("dice").style.display = "flex";
        }
      }

      function calculateSum() {
        const topSection = [
          SCORE_ONES,
          SCORE_TWOS,
          SCORE_THREES,
          SCORE_FOURS,
          SCORE_FIVES,
          SCORE_SIXES,
        ];

        return topSection.reduce((sum, key) => sum + (scores[key] || 0), 0);
      }

      function calculateBonus() {
        const topSection = [
          SCORE_ONES,
          SCORE_TWOS,
          SCORE_THREES,
          SCORE_FOURS,
          SCORE_FIVES,
          SCORE_SIXES,
        ];

        const sum = calculateSum();

        if (sum >= 63) return 35;

        const allFilled = topSection.every((key) => scores[key] !== null);

        return allFilled ? 0 : null;
      }

      function calculateTotal() {
        const sumAll = TABLE_ROWS_SELECTABLE.reduce(
          (sum, key) => sum + (scores[key] || 0),
          0,
        );
        return sumAll + (calculateBonus() || 0);
      }

      function showSuggestion(row) {
        const combined = [
          ...dices.filter((a) => a !== null),
          ...dicesKeep.filter((a) => a !== null),
        ];

        const score = scoreCalculators[row](combined);
        return '<span class="suggestion">' + score + "</span>";
      }

      function refreshTable() {
        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          document.getElementById(
            TABLE_ROWS_SELECTABLE[i],
          ).style.backgroundColor =
            mode === MODE_CHOOSE_SCORE && i === selectedTableRow
              ? "#45475a"
              : "";
        }

        for (let i = 0; i < TABLE_ROWS_SELECTABLE.length; i++) {
          const elem = document.getElementById(TABLE_ROWS_SELECTABLE[i])
            .children[1];
          elem.innerHTML =
            scores[TABLE_ROWS_SELECTABLE[i]] !== null
              ? scores[TABLE_ROWS_SELECTABLE[i]]
              : showSuggestion(TABLE_ROWS_SELECTABLE[i]);
        }

        document.getElementById(SCORE_SUM).children[1].innerHTML =
          calculateSum() + "/63";
        const bonus = calculateBonus();
        document.getElementById(SCORE_BONUS).children[1].innerHTML =
          bonus === null ? "" : bonus;
        document.getElementById(SCORE_TOTAL).children[1].innerHTML =
          calculateTotal();
      }

      function refreshDicesKeep() {
        for (let i = 0; i < 5; i++) {
          const diceElem = document.getElementById("diceKeep" + i);

          if (mode === MODE_DICES_KEEP && i == activeDiceKeep) {
            diceElem.style.backgroundColor = "#45475a";
            diceElem.style.borderRadius = "16px";
          } else {
            diceElem.style.backgroundColor = "transparent";
          }

          diceElem.src =
            dicesKeep[i] === null
              ? "none.svg"
              : "inverted-dice-" + dicesKeep[i] + ".svg";
        }
      }

      function refreshDices() {
        for (let i = 0; i < 5; i++) {
          const diceElem = document.getElementById("dice" + i);

          if (mode === MODE_DICES && i == activeDice) {
            diceElem.style.backgroundColor = "#45475a";
            diceElem.style.borderRadius = "24px";
          } else {
            diceElem.style.backgroundColor = "transparent";
          }

          diceElem.src =
            dices[i] === null
              ? "none.svg"
              : "inverted-dice-" + dices[i] + ".svg";
        }
      }

      function handleLoad() {
        initializeGame();
        refreshTable();
        refreshDices();
        refreshDicesKeep();
        refreshUI();
      }
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background-color: #1e1e2e;
        color: #cdd6f4;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      body,
      button {
        font-family: "Inter";
      }

      .main-container {
        display: flex;
        max-width: 896px;
        flex-direction: row;
      }

      .game-area {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        width: 640px;
      }

      @media (max-width: 768px) {
        body {
          padding: 5px;
        }

        .main-container {
          flex-direction: column;
          align-items: center;
          gap: 12px;
          padding: 10px;
        }

        .game-area {
          gap: 8px;
        }

        th,
        td {
          padding: 2px 4px;
          font-size: 12px;
        }

        button.roll-dice {
          font-size: 20px;
          padding: 4px 12px;
        }

        .end-of-game {
          font-size: 48px !important;
        }

        .dice img {
          width: 14vw;
          max-width: 50px;
        }

        .dice-keep img {
          width: 10vw;
          max-width: 38px;
        }
      }

      button.roll-dice {
        font-size: 20px;
        border: 0;
        border-radius: 8px;
        padding: 16px;
        background-color: #313244;
        color: #cdd6f4;
        cursor: pointer;
      }

      button.roll-dice:disabled {
        color: #6c7086;
      }

      .dice-keep img,
      .dice img,
      tbody tr.selectable {
        cursor: pointer;
      }

      table {
        border-collapse: collapse;
        width: 256px;
      }

      th {
        text-align: left;
      }

      th,
      td {
        border: 1px solid #45475a;
        padding: 4px;
        font-size: 14px;
        width: 50%;
      }

      td.sum {
        font-size: 12px;
      }

      th:first-child,
      td:first-child {
        border-left: 0;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      thead tr:first-child th {
        border-top: 0;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .suggestion {
        color: #6c7086;
      }

      .end-of-game {
        font-size: 96px;
      }
    </style>
  </head>
  <body onkeydown="handleKeyDown(event)" onload="handleLoad()">
    <div class="main-container">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="border-bottom: 1px solid #7f849c">Roll</th>
              <th style="border-bottom: 1px solid #7f849c">Score</th>
            </tr>
          </thead>
          <tbody>
            <tr
              class="selectable"
              id="scoreOnes"
              onclick="handleRowClick('scoreOnes')"
            >
              <td>Ones</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreTwos"
              onclick="handleRowClick('scoreTwos')"
            >
              <td>Twos</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreThrees"
              onclick="handleRowClick('scoreThrees')"
            >
              <td>Threes</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreFours"
              onclick="handleRowClick('scoreFours')"
            >
              <td>Fours</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreFives"
              onclick="handleRowClick('scoreFives')"
            >
              <td>Fives</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreSixes"
              onclick="handleRowClick('scoreSixes')"
            >
              <td style="border-bottom: 1px solid #7f849c">Sixes</td>
              <td style="border-bottom: 1px solid #7f849c"></td>
            </tr>
            <tr id="scoreSum">
              <td>Sum</td>
              <td class="sum"></td>
            </tr>
            <tr id="scoreBonus">
              <td style="border-bottom: 1px solid #7f849c">Bonus</td>
              <td style="border-bottom: 1px solid #7f849c"></td>
            </tr>
            <tr
              class="selectable"
              id="scoreFullHouse"
              onclick="handleRowClick('scoreFullHouse')"
            >
              <td>Full House</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreFourOfAKind"
              onclick="handleRowClick('scoreFourOfAKind')"
            >
              <td>4 of a Kind</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreSmallStraight"
              onclick="handleRowClick('scoreSmallStraight')"
            >
              <td>Small Straight</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreBigStraight"
              onclick="handleRowClick('scoreBigStraight')"
            >
              <td>Big Straight</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreChoice"
              onclick="handleRowClick('scoreChoice')"
            >
              <td>Choice</td>
              <td></td>
            </tr>
            <tr
              class="selectable"
              id="scoreYacht"
              onclick="handleRowClick('scoreYacht')"
            >
              <td style="border-bottom: 1px solid #7f849c">Yacht</td>
              <td style="border-bottom: 1px solid #7f849c"></td>
            </tr>
            <tr id="scoreTotal">
              <td>Total</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="game-area">
        <div class="end-of-game" id="endOfGame" style="display: none">
          Well done!
        </div>
        <div class="dice-keep" id="diceKeep">
          <img
            id="diceKeep0"
            src="none.svg"
            width="64"
            onclick="handleDiceKeepClick(0)"
          />
          <img
            id="diceKeep1"
            src="none.svg"
            width="64"
            onclick="handleDiceKeepClick(1)"
          />
          <img
            id="diceKeep2"
            src="none.svg"
            width="64"
            onclick="handleDiceKeepClick(2)"
          />
          <img
            id="diceKeep3"
            src="none.svg"
            width="64"
            onclick="handleDiceKeepClick(3)"
          />
          <img
            id="diceKeep4"
            src="none.svg"
            width="64"
            onclick="handleDiceKeepClick(4)"
          />
        </div>
        <div class="dice" id="dice">
          <img
            id="dice0"
            src="none.svg"
            width="96"
            onclick="handleDiceClick(0)"
          />
          <img
            id="dice1"
            src="none.svg"
            width="96"
            onclick="handleDiceClick(1)"
          />
          <img
            id="dice2"
            src="none.svg"
            width="96"
            onclick="handleDiceClick(2)"
          />
          <img
            id="dice3"
            src="none.svg"
            width="96"
            onclick="handleDiceClick(3)"
          />
          <img
            id="dice4"
            src="none.svg"
            width="96"
            onclick="handleDiceClick(4)"
          />
        </div>
        <div>
          <button class="roll-dice" id="rollDice" onclick="handleRollClick()">
            Roll dice (2)
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
